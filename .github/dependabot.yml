version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    versioning-strategy: increase

  - package-ecosystem: 'npm'
    directory: '/api'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    versioning-strategy: increase
    allow:
      - dependency-type: 'direct'
    ignore:
      - dependency-name: '@types/*'

  - package-ecosystem: 'npm'
    directory: '/client'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    versioning-strategy: increase
    allow:
      - dependency-type: 'direct'
    ignore:
      - dependency-name: '@types/*'
